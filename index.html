<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Science Claw New</title>

<link rel="icon"
type="image/png"
href="favicon.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
background:#050505;
color:white;
font-family:Arial,sans-serif;
}

#canvas-container{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
z-index:1;
}

#registration-screen{
position:absolute;
top:25px;
left:25px;
z-index:50;
}

#registration-screen input,
#registration-screen select{

width:250px;
padding:12px;
margin-top:10px;
font-size:18px;

}

#registration-screen button{

padding:15px;
font-size:20px;
margin-top:15px;
cursor:pointer;

}

#camera-bar{

position:fixed;

top:15px;

left:50%;

transform:translateX(-50%);

z-index:40;

display:flex;

gap:10px;

}

#camera-bar button{

padding:10px 20px;

font-size:16px;

border:none;

border-radius:10px;

cursor:pointer;

}  
#ui-layer{
position:absolute;
left:20px;
bottom:20px;
z-index:20;
}

.hud{

width:240px;

background:rgba(
0,
0,
0,
0.82
);

padding:20px;

border-radius:20px;

backdrop-filter:blur(6px);

}

.hud p{

font-size:18px;
margin:8px 0;

}

.hud hr{

border:none;
height:1px;
background:#666;

margin:15px 0;

}

.hud button{

width:100%;
padding:12px;
margin-top:8px;
font-size:18px;
cursor:pointer;

}

.modal{

display:none;

position:fixed;

top:50%;
left:50%;

transform:translate(
-50%,
-50%
);

background:#111;

padding:30px;

border-radius:20px;

z-index:100;

width:360px;

box-shadow:
0 0 30px rgba(0,0,0,0.7);

}

.modal button{

width:100%;
padding:12px;
margin-top:10px;
font-size:18px;

}

#answer-area button{

width:100%;
margin-top:10px;
padding:12px;

}

#controls-guide{

position:absolute;

right:20px;
bottom:20px;

z-index:20;

width:260px;

background:rgba(
0,
0,
0,
0.75
);

padding:15px;

border-radius:15px;

font-size:15px;

}

</style>

</head>

<body>

<div id="registration-screen">

<h1>SCIENCE CLAW NEW</h1>

<input
id="student-name"
placeholder="Student Name">

<br>

<select id="student-class">

<option value="P3">Primary 3</option>
<option value="P4">Primary 4</option>
<option value="P5">Primary 5</option>
<option value="P6">Primary 6</option>

</select>

<br>

<button onclick="authorizeStudentLogin()">
Enter Machine
</button>

</div>

<div id="canvas-container"></div>
<div id="camera-bar">

<button onclick="setCameraView('front')">
Front
</button>

<button onclick="setCameraView('top')">
Top
</button>

<button onclick="setCameraView('side')">
Side
</button>

</div>

<div id="ui-layer">

<div class="hud">

<p>
Player:
<span id="player-hud-tag">Guest</span>
</p>

<p>
Credits:
<span id="credit-display">0</span>
</p>

<p>
Streak:
<span id="streak-display">0</span>
</p>

<p>
Prizes:
<span id="prizes-display">0</span>
</p>

<p>
Accuracy:
<span id="accuracy-display">0%</span>
</p>

<hr>

<hr>

<button onclick="showTopUpMenu()">
Earn Credits
</button>

<button onclick="openDashboard?.()">
Dashboard
</button>

<button onclick="saveGameReport?.()">
Save Report
</button>

<button onclick="resetPlayer()">
Switch Player
</button>

</div>

</div>

<div id="controls-guide">

<b>Controls</b>

<hr>

← / A = Move Left

<br><br>

→ / D = Move Right

<br><br>

↑ / W = Forward

<br><br>

↓ / S = Backward

<br><br>

SPACE = Drop Claw

<br><br>

1 = Front View

<br>

2 = Top View

<br>

3 = Side View

</div>

<div
id="topup-modal"
class="modal">

<h2>Earn Credits</h2>

<button onclick="startQuiz(1,3)">
1 Question = +3 Credits
</button>

<button onclick="startQuiz(3,10)">
3 Questions = +10 Credits
</button>

<button onclick="document.getElementById('topup-modal').style.display='none'">
Close
</button>

</div>

<div
id="quiz-modal"
class="modal">

<h2 id="question-title">
Question
</h2>

<p id="question-text"></p>

<div id="answer-area"></div>

<button onclick="submitAnswer()">
Submit Answer
</button>

</div>

<script src="questions.js"></script>

<script src="backend.js"></script>

<script src="quiz.js"></script>

<script src="analytics.js"></script>

<script src="game.js"></script>

<script src="ui.js"></script>

</body>
</html>
