<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<title>

Science Claw New

</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="registration-screen" class="screen">

<div class="portal-box">

<h1>

SCIENCE CLAW NEW

</h1>

<p>

Learning Through Play

</p>

<input
id="student-name"
placeholder="Student Name"
>

<select id="student-class">

<option value="P3">

Primary 3

</option>

<option value="P4">

Primary 4

</option>

<option value="P5">

Primary 5

</option>

<option value="P6">

Primary 6

</option>

</select>

<button onclick="authorizeStudentLogin()">

Enter Machine

</button>

</div>

</div>


<div id="canvas-container"></div>


<div id="ui-layer">

Science Claw

</h2>

Credits:

0

</span>

</p>

Streak:

<span id="streak-display">

0

</span>

</p>

Prizes:

<span id="prizes-display">

0

</span>

</p>

<p>

Accuracy:

<span id="accuracy-display">

0%

</span>

</p>

</div>

</div>

<script src="backend.js"></script>

<script src="ui.js"></script>

<script src="game.js"></script>

<script src="quiz.js"></script>

<script src="questions.js"></script>

<script src="analytics.js"></script>

</html>
