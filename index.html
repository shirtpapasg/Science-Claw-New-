<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>

Science Claw New

</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>


<div id="registration-screen">

<h1>

SCIENCE CLAW NEW

</h1>

<input
id="student-name"
placeholder="Student Name">

<br><br>

<select id="student-class">

<option value="P3">

Primary 3

</option>

<option value="P4">

Primary 4

</option>

<option value="P5">

Primary 5

</option>

<option value="P6">

Primary 6

</option>

</select>

<br><br>

<button onclick="authorizeStudentLogin()">

Enter Machine

</button>

</div>



<div id="ui-layer"
style="display:block;">

<div class="hud">

<p id="player-hud-tag">

Guest

</p>

<p>

Credits:

<span id="credit-display">

0

</span>

</p>

<p>

Streak:

<span id="streak-display">

0

</span>

</p>

<p>

Prizes:

<span id="prizes-display">

0

</span>

</p>

<p>

Accuracy:

<span id="accuracy-display">

0%

</span>

</p>


<button onclick="playMachine()">

Play Machine

</button>

<button onclick="showTopUpMenu()">

Earn Credits

</button>

<button onclick="saveGameReport()">

Save Report

</button>

<button onclick="resetPlayer()">

Switch Player

</button>

</div>

</div>



<div id="canvas-container">

</div>



<div id="topup-modal"
style="display:none;">

<h2>

Earn Credits

</h2>

<button onclick="startQuiz(5,5)">

5 Questions → +5 Credits

</button>

</div>



<div id="quiz-modal"
style="display:none;">

<h2 id="question-title">

Question

</h2>

<p id="question-text">

</p>

<div id="answer-area">

</div>

<button onclick="submitAnswer()">

Submit

</button>

</div>



<script src="questions.js"></script>

<script src="backend.js"></script>

<script src="analytics.js"></script>

<script src="quiz.js"></script>

<script src="game.js"></script>

<script src="ui.js"></script>

</body>

</html>
